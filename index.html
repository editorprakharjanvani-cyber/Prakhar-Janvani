<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>प्रखर जनवाणी</title>

<style>
body {font-family: Arial; margin:0; background:#f4f4f4}
header {background:#b30000; color:white; padding:10px; text-align:center}
header .top {font-size:14px}
header h1 {margin:5px 0}
header .tagline {font-size:14px}
header .info {display:flex; justify-content:space-between; font-size:12px; margin-top:5px}
nav {background:#333; padding:10px; text-align:center}
nav a {color:white; margin:8px; text-decoration:none; cursor:pointer}
.container {padding:15px; max-width:1000px; margin:auto}
.news {background:white; padding:15px; margin-bottom:15px; border-radius:8px}
.news img {width:100%; margin:10px 0; border-radius:5px}
.admin {background:#fff; padding:15px; margin-top:20px}
input, textarea, select {width:100%; margin:5px 0; padding:8px}
button {background:#b30000; color:white; padding:10px; border:none}
</style>
</head>

<body>

<header>
  <div class="top">साप्ताहिक</div>
  <h1>प्रखर जनवाणी</h1>
  <div class="tagline">हर ख़बर पर सच की नज़र</div>
  <div class="info">
    <span>उत्तराखण्ड का हिंदी साप्ताहिक समाचारपत्र</span>
    <span>editor.prakharjanvani@gmail.com | 6355979099</span>
  </div>
</header>

<nav>
  <a onclick="loadPage('home')">होम</a>
  <a onclick="loadPage('उत्तराखण्ड समाचार')">उत्तराखण्ड समाचार</a>
  <a onclick="loadPage('संपादकीय')">संपादकीय</a>
  <a onclick="loadPage('अन्य प्रादेशिक')">अन्य प्रादेशिक</a>
  <a onclick="loadPage('राष्ट्रीय')">राष्ट्रीय</a>
  <a onclick="loadPage('शिक्षा')">शिक्षा</a>
  <a onclick="loadPage('मनोरंजन')">मनोरंजन</a>
  <a onclick="loadPage('खेल')">खेल</a>
  <a onclick="loadPage('contact')">संपर्क</a>
</nav>

<div class="container">
  <div id="content"></div>

  <div class="admin">
    <h3>Admin Login</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <div id="adminPanel" style="display:none;">
      <h3>समाचार जोड़ें</h3>
      <input type="text" id="title" placeholder="शीर्षक">
      <textarea id="newsContent" placeholder="समाचार लिखें"></textarea>
      <input type="file" id="imageFile">
      <select id="category">
        <option>उत्तराखण्ड समाचार</option>
        <option>संपादकीय</option>
        <option>अन्य प्रादेशिक</option>
        <option>राष्ट्रीय</option>
        <option>शिक्षा</option>
        <option>मनोरंजन</option>
        <option>खेल</option>
      </select>
      <button onclick="addNews()">Publish</button>
    </div>
  </div>
</div>

<script>

let newsData = JSON.parse(localStorage.getItem('news')) || [];

function login() {
  let email = document.getElementById('email').value;
  let password = document.getElementById('password').value;

  if(email === "editor.prakharjanvani@gmail.com" && password === "1234") {
    document.getElementById('adminPanel').style.display = 'block';
    alert("Login Successful");
  } else {
    alert("Wrong Email or Password");
  }
}

function addNews() {
  let title = document.getElementById('title').value;
  let content = document.getElementById('newsContent').value;
  let file = document.getElementById('imageFile').files[0];
  let category = document.getElementById('category').value;

  if (!title || !content) {
    alert("Title और Content भरें");
    return;
  }

  if(file){
    let reader = new FileReader();
    reader.onload = function(e){
      saveNews(title, content, e.target.result, category);
    }
    reader.readAsDataURL(file);
  } else {
    saveNews(title, content, "", category);
  }
}

function saveNews(title, content, image, category){
  newsData.push({title, content, image, category});
  localStorage.setItem('news', JSON.stringify(newsData));
  alert("News Published");
  loadPage(category);
}

function loadPage(page) {
  let content = document.getElementById('content');

  if(page === 'home') {
    content.innerHTML = `
    <h2>होम</h2>
    <p>"प्रखर जनवाणी" देहरादून उत्तराखण्ड से प्रकाशित होने वाला हिन्दी साप्ताहिक समाचार पत्र है। "प्रखर जनवाणी" अपनी टैग लाइन "हर ख़बर पर सच की नज़र" के अनुरूप आम जन तक प्रदेश, राष्ट्र और अंतराष्ट्रीय ताज़ा, सच्ची खबरें पहुंचाता हैं। प्रखर जनवाणी देश की जनता की नब्ज को पहचानता है।</p>`;
    return;
  }

  if(page === 'contact') {
    content.innerHTML = `
    <h2>हमसे संपर्क करें</h2>
    <p>प्रखर जनवाणी हिंदी साप्ताहिक<br>
    221 , दून हाइट्स, कांसवली कोठरी<br>
    देहरादून , उत्तराखण्ड 248007<br>
    मोबाइल: 6355979099<br>
    ईमेल: editor.prakharjanvani@gmail.com</p>`;
    return;
  }

  let filtered = newsData.filter(n => n.category === page);

  content.innerHTML = filtered.reverse().map(n => `
    <div class="news">
      <h3>${n.title}</h3>
      ${n.image ? `<img src="${n.image}">` : ''}
      <p>${n.content}</p>
    </div>
  `).join('');
}

loadPage('home');

</script>

</body>
</html>
